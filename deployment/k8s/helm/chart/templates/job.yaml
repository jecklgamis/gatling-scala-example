apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "gatling-scala-example.fullname" . }}
  labels:
    {{- include "gatling-scala-example.labels" . | nindent 4 }}
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - name: gatling-scala-example
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: Always
          env:
            - name: JAVA_OPTS
              value: "{{ .Values.simulation.javaOpts }}"
            - name: SIMULATION_NAME
              value: "{{ .Values.simulation.name }}"
      restartPolicy: Never
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

